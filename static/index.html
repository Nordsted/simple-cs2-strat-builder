<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS2 Chat Strat Builder</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hero card">
        <div class="hero-copy">
          <p class="eyebrow">CS2 Chat Strat builder</p>
          <h1>Strats in chat made easy</h1>
          <p class="lead">
            Select map and side, you now have your preferred strats at the tip of your fingers.
          </p>
        </div>
      </section>

      <section class="builder card">
        <div class="builder-sidebar">
          <label>
            <select id="mapSelect"></select>
          </label>

          <section class="side-picker" aria-labelledby="sidePickerLabel">
            <div class="side-button-group" role="group" aria-label="Pick side">
              <button type="button" class="side-button is-selected" data-side="T" aria-pressed="true">T Side</button>
              <button type="button" class="side-button" data-side="CT" aria-pressed="false">CT Side</button>
            </div>
          </section>

          <div class="button-stack">
            <button id="copyButton" class="primary">Copy config</button>
            <button id="showButton">Show config</button>
          </div>

          <p id="copyStatus" class="status"></p>
        </div>

        <div class="builder-editor">
          <div class="editor-header">
            <div>
              <h2>Numpad binds</h2>
            </div>
          </div>

          <div id="bindingsEditor" class="bindings-editor"></div>
        </div>
      </section>
    </main>

    <dialog id="commandDialog">
      <form method="dialog" class="dialog-content">
        <div class="dialog-header">
          <h3>Copy the config manually</h3>
          <button>Close</button>
        </div>
        <textarea id="dialogTextarea" rows="8" readonly></textarea>
      </form>
    </dialog>

    <dialog id="slotDialog">
      <form method="dialog" class="dialog-content">
        <div class="dialog-header">
          <h3 id="slotDialogTitle">Pick a strat</h3>
          <button>Close</button>
        </div>
        <div id="slotDialogOptions" class="slot-dialog-options"></div>
      </form>
    </dialog>

    <script src="/app.js" defer></script>
  </body>
</html>
